<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Buttons</title>
</head>
<body>
    <table>
        <tr>
            <td><button onclick="parent.press('1')">1</button></td>
            <td><button onclick="parent.press('2')">2</button></td>
            <td><button onclick="parent.press('3')">3</button></td>
        </tr>
        <tr>
            <td><button onclick="parent.press('4')">4</button></td>
            <td><button onclick="parent.press('5')">5</button></td>
            <td><button onclick="parent.press('6')">6</button></td>
        </tr>
        <tr>
            <td><button onclick="parent.press('7')">7</button></td>
            <td><button onclick="parent.press('8')">8</button></td>
            <td><button onclick="parent.press('9')">9</button></td>
        </tr>
        <tr>
            <td><button onclick="parent.press('0')">0</button></td>
            <td><button onclick="parent.press('+')">+</button></td>
            <td><button onclick="parent.calculate()">=</button></td>
        </tr>
        <tr>
            <td colspan="3"><button onclick="parent.clearDisplay()">C</button></td>
        </tr>
    </table>
</body>
</html>
